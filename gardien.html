
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Gardien des Archives — SOULSCRIPT</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --noir: #0a0806;
      --or: #c9a84c;
      --or-pale: #e8d5a3;
      --or-dim: #6b5010;
      --bronze: #8b6914;
      --ivoire: #f0e6cc;
      --cendre: #4a4035;
    }

    html, body {
      height: 100%;
      background: var(--noir);
      color: var(--ivoire);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow: hidden;
    }

    /* ── LAYOUT PRINCIPAL ── */
    .scene {
      display: flex;
      height: 100vh;
      position: relative;
    }

    /* ── PARTIE GAUCHE : SCRIBE (60%) ── */
    .scribe-zone {
      position: relative;
      width: 60%;
      height: 100%;
      overflow: hidden;
      flex-shrink: 0;
    }

    .scribe-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
    }

    /* Overlay gradient vers la droite */
    .scribe-zone::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, transparent 60%, var(--noir) 100%);
      pointer-events: none;
    }

    /* Overlay gradient vers le bas pour le champ */
    .scribe-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(10,8,6,0.3) 0%, transparent 30%, transparent 65%, rgba(10,8,6,0.9) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Header SOULSCRIPT sur la vidéo */
    .header-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 2;
      padding: 2rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }

    .header-eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      letter-spacing: 0.35em;
      color: var(--or-dim);
      text-transform: uppercase;
    }

    .header-title {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      color: var(--or);
      font-weight: 400;
      text-shadow: 0 0 30px rgba(201,168,76,0.4);
    }

    /* Lion sceau */
    .lion-seal {
      position: absolute;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      opacity: 0.35;
      font-size: 1.8rem;
      color: var(--or);
      text-shadow: 0 0 20px rgba(201,168,76,0.6);
      transition: opacity 0.5s;
    }

    .lion-seal.active {
      opacity: 0.7;
      animation: pulse-lion 1.5s ease-in-out infinite;
    }

    @keyframes pulse-lion {
      0%, 100% { text-shadow: 0 0 20px rgba(201,168,76,0.4); }
      50% { text-shadow: 0 0 50px rgba(201,168,76,0.9); }
    }

    /* ── PARTIE DROITE : PARCHEMIN (40%) ── */
    .parchemin-zone {
      width: 40%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem 2.5rem 10rem 1.5rem;
      position: relative;
    }

    .parchemin {
      position: relative;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .parchemin.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .parchemin-label {
      font-family: 'Cinzel', serif;
      font-size: 0.5rem;
      letter-spacing: 0.4em;
      color: var(--or-dim);
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .parchemin-label::before,
    .parchemin-label::after {
      content: '◆';
      font-size: 0.4rem;
      color: var(--or-dim);
    }

    .parchemin-texte {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 1.4vw, 1.2rem);
      font-weight: 300;
      font-style: italic;
      color: var(--or-pale);
      line-height: 2;
      letter-spacing: 0.02em;
      min-height: 3rem;
    }

    /* Bordure gauche dorée */
    .parchemin::before {
      content: '';
      position: absolute;
      left: -1.5rem;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--or-dim), transparent);
    }

    /* Curseur clignotant */
    .curseur {
      display: inline-block;
      width: 1px;
      height: 1.1em;
      background: var(--or);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* État consultation */
    .consultation-state {
      display: none;
      flex-direction: column;
      gap: 1rem;
      align-items: flex-start;
    }

    .consultation-state.visible {
      display: flex;
    }

    .consultation-label {
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      letter-spacing: 0.4em;
      color: var(--or-dim);
      text-transform: uppercase;
      animation: fade-pulse 2s ease-in-out infinite;
    }

    @keyframes fade-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .runes-animation {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--or);
      opacity: 0.6;
      animation: runes-shift 3s linear infinite;
    }

    @keyframes runes-shift {
      0% { content: '᛭ ᚱ ᚢ ᚾ ᛖ ᛋ'; opacity: 0.3; }
      50% { opacity: 0.8; }
      100% { opacity: 0.3; }
    }

    /* ── CHAMP DE QUESTION ── */
    .question-zone {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 1.5rem 2.5rem 2rem;
      background: linear-gradient(to top, rgba(10,8,6,0.98) 70%, transparent);
    }

    .question-inner {
      display: flex;
      gap: 1rem;
      align-items: flex-end;
      max-width: 900px;
      margin: 0 auto;
    }

    .question-input {
      flex: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(201,168,76,0.2);
      color: var(--ivoire);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1rem;
      font-style: italic;
      font-weight: 300;
      padding: 1rem 1.25rem;
      resize: none;
      min-height: 52px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.3s;
      line-height: 1.6;
    }

    .question-input::placeholder {
      color: var(--cendre);
      font-style: italic;
    }

    .question-input:focus {
      border-color: rgba(201,168,76,0.5);
    }

    .question-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .consulter-btn {
      background: transparent;
      border: 1px solid var(--or-dim);
      color: var(--or);
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 1rem 1.5rem;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
      height: 52px;
      flex-shrink: 0;
    }

    .consulter-btn:hover:not(:disabled) {
      background: rgba(201,168,76,0.1);
      border-color: var(--or);
      box-shadow: 0 0 20px rgba(201,168,76,0.15);
    }

    .consulter-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Ligne de séparation au-dessus */
    .question-zone::before {
      content: '';
      display: block;
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.15), transparent);
      margin-bottom: 1.25rem;
    }

    /* Mention bas de page */
    .mention {
      text-align: center;
      margin-top: 0.75rem;
      font-family: 'Cinzel', serif;
      font-size: 0.45rem;
      letter-spacing: 0.3em;
      color: var(--cendre);
      text-transform: uppercase;
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      html, body { overflow: auto; }

      .scene {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
      }

      .scribe-zone {
        width: 100%;
        height: 55vw;
        min-height: 220px;
        max-height: 320px;
      }

      .scribe-zone::after {
        background: linear-gradient(to bottom, transparent 60%, var(--noir) 100%);
      }

      .parchemin-zone {
        width: 100%;
        height: auto;
        padding: 2rem 1.5rem 8rem;
      }

      .parchemin::before { display: none; }

      .question-zone {
        padding: 1rem 1rem 1.25rem;
      }

      .header-title { font-size: 0.85rem; }
      .lion-seal { font-size: 1.2rem; bottom: 1rem; }
    }
  </style>
</head>
<body>

<div class="scene">

  <!-- SCRIBE -->
  <div class="scribe-zone">
    <video
      class="scribe-video"
      src="/gardien-loop.mp4"
      autoplay
      muted
      loop
      playsinline
    ></video>

    <div class="header-overlay">
      <span class="header-eyebrow">Archives de l'Âme · Bibliothèque Interdite</span>
      <span class="header-title">Le Gardien des Archives</span>
    </div>

    <div class="lion-seal" id="lionSeal">🦁</div>
  </div>

  <!-- PARCHEMIN -->
  <div class="parchemin-zone">

    <!-- État consultation -->
    <div class="consultation-state" id="consultationState">
      <div class="parchemin-label">Le Gardien consulte les Archives</div>
      <div class="runes-animation">᛭ &nbsp; ᚱ &nbsp; ᚢ &nbsp; ᚾ &nbsp; ᛖ &nbsp; ᛋ &nbsp; ᛭</div>
    </div>

    <!-- Parchemin réponse -->
    <div class="parchemin" id="parchemin">
      <div class="parchemin-label">Le Gardien révèle</div>
      <div class="parchemin-texte" id="parcheeminTexte"></div>
    </div>

  </div>

</div>

<!-- CHAMP QUESTION -->
<div class="question-zone">
  <div class="question-inner">
    <textarea
      id="questionInput"
      class="question-input"
      rows="1"
      placeholder="Posez votre question au Gardien des Archives…"
    ></textarea>
    <button id="consulterBtn" class="consulter-btn">Consulter</button>
  </div>
  <div class="mention">◆ &nbsp; Le Gardien éclaire. Il ne décide pas à votre place. &nbsp; ◆</div>
</div>

<script>
  const input = document.getElementById('questionInput');
  const btn = document.getElementById('consulterBtn');
  const parcheeminTexte = document.getElementById('parcheeminTexte');
  const parchemin = document.getElementById('parchemin');
  const consultationState = document.getElementById('consultationState');
  const lionSeal = document.getElementById('lionSeal');

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  // Enter pour envoyer
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      consulter();
    }
  });

  btn.addEventListener('click', consulter);

  const historique = [];

  async function consulter() {
    const question = input.value.trim();
    if (!question || btn.disabled) return;

    // Verrouillage
    input.disabled = true;
    btn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    // État consultation
    parchemin.classList.remove('visible');
    consultationState.classList.add('visible');
    lionSeal.classList.add('active');
    parcheeminTexte.textContent = '';

    historique.push({ role: 'user', content: question });

    try {
      const res = await fetch('/.netlify/functions/gardien', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: historique }),
      });

      const data = await res.json();
      const reponse = data.reply ?? "Les Archives sont momentanément silencieuses. Revenez dans quelques instants.";

      historique.push({ role: 'assistant', content: reponse });

      // Révélation
      consultationState.classList.remove('visible');
      parchemin.classList.add('visible');
      await revelerTexte(reponse);

    } catch {
      consultationState.classList.remove('visible');
      parchemin.classList.add('visible');
      await revelerTexte("Les Archives sont momentanément silencieuses. Revenez dans quelques instants.");
    }

    lionSeal.classList.remove('active');
    input.disabled = false;
    btn.disabled = false;
    input.focus();
  }

  async function revelerTexte(texte) {
    parcheeminTexte.textContent = '';
    const curseur = document.createElement('span');
    curseur.className = 'curseur';
    parcheeminTexte.appendChild(curseur);

    for (let i = 0; i < texte.length; i++) {
      const char = document.createTextNode(texte[i]);
      parcheeminTexte.insertBefore(char, curseur);
      await sleep(texte[i] === ' ' ? 25 : texte[i] === '.' || texte[i] === '?' ? 120 : 35);
    }

    // Supprimer curseur après révélation
    setTimeout(() => curseur.remove(), 2000);
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }
</script>

</body>
</html>
