
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Gardien des Archives — SOULSCRIPT</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --noir: #0a0806;
      --or: #c9a84c;
      --or-pale: #e8d5a3;
      --or-dim: #6b5010;
      --ivoire: #f0e6cc;
      --cendre: #4a4035;
    }

    html, body {
      height: 100%;
      background: var(--noir);
      color: var(--ivoire);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow: hidden;
    }

    /* ══ DESKTOP ══ */
    .scene {
      display: flex;
      height: 100vh;
    }

    .scribe-zone {
      position: relative;
      width: 60%;
      height: 100%;
      overflow: hidden;
      flex-shrink: 0;
    }

    .scribe-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
    }

    .scribe-zone::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, transparent 55%, var(--noir) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .scribe-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(10,8,6,0.5) 0%, transparent 25%, transparent 70%, rgba(10,8,6,0.85) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .header-overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 2;
      padding: 1.75rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .header-eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 0.5rem;
      letter-spacing: 0.35em;
      color: var(--or-dim);
      text-transform: uppercase;
    }

    .header-title {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      letter-spacing: 0.2em;
      color: var(--or);
      font-weight: 400;
      text-shadow: 0 0 30px rgba(201,168,76,0.4);
    }

    .lion-seal {
      position: absolute;
      bottom: 4.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      opacity: 0.3;
      font-size: 1.6rem;
      color: var(--or);
      transition: opacity 0.5s;
    }

    .lion-seal.active {
      opacity: 0.8;
      animation: pulse-lion 1.2s ease-in-out infinite;
    }

    @keyframes pulse-lion {
      0%, 100% { text-shadow: 0 0 20px rgba(201,168,76,0.3); }
      50% { text-shadow: 0 0 60px rgba(201,168,76,1); }
    }

    .parchemin-zone {
      width: 40%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem 2.5rem 9rem 2rem;
    }

    .parchemin {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }

    .parchemin.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .parchemin-label {
      font-family: 'Cinzel', serif;
      font-size: 0.48rem;
      letter-spacing: 0.4em;
      color: var(--or-dim);
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .parchemin-label::before,
    .parchemin-label::after {
      content: '◆';
      font-size: 0.38rem;
      color: var(--or-dim);
    }

    .parchemin-texte {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 1.3vw, 1.15rem);
      font-weight: 300;
      font-style: italic;
      color: var(--or-pale);
      line-height: 2.1;
    }

    .curseur {
      display: inline-block;
      width: 1px;
      height: 1em;
      background: var(--or);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .consultation-state {
      display: none;
      flex-direction: column;
      gap: 1.25rem;
    }

    .consultation-state.visible { display: flex; }

    .consultation-label {
      font-family: 'Cinzel', serif;
      font-size: 0.52rem;
      letter-spacing: 0.4em;
      color: var(--or-dim);
      text-transform: uppercase;
      animation: fade-pulse 2s ease-in-out infinite;
    }

    @keyframes fade-pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .runes-animation {
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      color: var(--or);
      opacity: 0.5;
      animation: fade-pulse 2.5s ease-in-out infinite;
    }

    /* ══ CHAMP QUESTION ══ */
    .question-zone {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 1.25rem 2rem 1.75rem;
      background: linear-gradient(to top, rgba(10,8,6,0.98) 75%, transparent);
    }

    .question-zone::before {
      content: '';
      display: block;
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.12), transparent);
      margin-bottom: 1rem;
    }

    .question-inner {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      max-width: 860px;
      margin: 0 auto;
    }

    .question-input {
      flex: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(201,168,76,0.18);
      color: var(--ivoire);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1rem;
      font-style: italic;
      font-weight: 300;
      padding: 0.9rem 1.1rem;
      resize: none;
      min-height: 48px;
      max-height: 110px;
      outline: none;
      transition: border-color 0.3s;
      line-height: 1.6;
    }

    .question-input::placeholder { color: var(--cendre); font-style: italic; }
    .question-input:focus { border-color: rgba(201,168,76,0.45); }
    .question-input:disabled { opacity: 0.4; cursor: not-allowed; }

    .consulter-btn {
      background: transparent;
      border: 1px solid var(--or-dim);
      color: var(--or);
      font-family: 'Cinzel', serif;
      font-size: 0.5rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0.9rem 1.3rem;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
      height: 48px;
      flex-shrink: 0;
    }

    .consulter-btn:hover:not(:disabled) {
      background: rgba(201,168,76,0.08);
      border-color: var(--or);
    }

    .consulter-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    .mention {
      text-align: center;
      margin-top: 0.6rem;
      font-family: 'Cinzel', serif;
      font-size: 0.42rem;
      letter-spacing: 0.28em;
      color: var(--cendre);
      text-transform: uppercase;
    }

    /* ══ MOBILE ══ */
    @media (max-width: 768px) {
      html, body {
        overflow: hidden;
        height: 100dvh;
      }

      .scene {
        flex-direction: column;
        height: 100dvh;
        position: relative;
      }

      /* Vidéo : hauteur fixe compacte */
      .scribe-zone {
        width: 100%;
        height: 42vh;
        flex-shrink: 0;
        position: relative;
      }

      .scribe-video {
        object-fit: cover;
        object-position: center 20%;
      }

      /* Gradient vers le bas uniquement */
      .scribe-zone::after {
        background: linear-gradient(to bottom, transparent 40%, var(--noir) 100%);
      }

      .scribe-zone::before {
        background: rgba(10,8,6,0.25);
      }

      .header-overlay {
        padding: 0.75rem 1rem;
      }

      .header-eyebrow { font-size: 0.38rem; letter-spacing: 0.18em; }
      .header-title { font-size: 0.68rem; letter-spacing: 0.1em; }

      .lion-seal {
        font-size: 0.9rem;
        bottom: 0.4rem;
      }

      /* Parchemin : juste sous la vidéo, compact */
      .parchemin-zone {
        width: 100%;
        flex: 1;
        padding: 0.75rem 1.25rem 0;
        justify-content: flex-start;
        overflow: hidden;
      }

      .parchemin-texte {
        font-size: 0.88rem;
        line-height: 1.75;
      }

      .parchemin-label {
        font-size: 0.4rem;
        margin-bottom: 0.5rem;
        letter-spacing: 0.3em;
      }

      .consultation-label {
        font-size: 0.42rem;
        letter-spacing: 0.3em;
      }

      .runes-animation {
        font-size: 0.6rem;
        letter-spacing: 0.3em;
      }

      /* Champ : compact, collé en bas */
      .question-zone {
        padding: 0.4rem 0.9rem 0.6rem;
        background: linear-gradient(to top, rgba(10,8,6,1) 80%, transparent);
      }

      .question-zone::before {
        margin-bottom: 0.4rem;
      }

      .question-inner { gap: 0.4rem; }

      .question-input {
        font-size: 0.88rem;
        padding: 0.55rem 0.8rem;
        min-height: 38px;
      }

      .consulter-btn {
        font-size: 0.4rem;
        padding: 0.55rem 0.8rem;
        height: 38px;
        letter-spacing: 0.12em;
      }

      .mention {
        font-size: 0.32rem;
        margin-top: 0.25rem;
      }
    }
  </style>
</head>
<body>

<div class="scene">

  <div class="scribe-zone">
    <video class="scribe-video" src="/gardien-loop.mp4" autoplay muted loop playsinline></video>
    <div class="header-overlay">
      <span class="header-eyebrow">Archives de l'Âme · Bibliothèque Interdite</span>
      <span class="header-title">Le Gardien des Archives</span>
    </div>
    <div class="lion-seal" id="lionSeal">🦁</div>
  </div>

  <div class="parchemin-zone">
    <div class="consultation-state" id="consultationState">
      <div class="consultation-label">Le Gardien consulte les Archives</div>
      <div class="runes-animation">᛭ &nbsp; ᚱ &nbsp; ᚢ &nbsp; ᚾ &nbsp; ᛖ &nbsp; ᛋ &nbsp; ᛭</div>
    </div>
    <div class="parchemin" id="parchemin">
      <div class="parchemin-label">Le Gardien révèle</div>
      <div class="parchemin-texte" id="parcheeminTexte"></div>
    </div>
  </div>

</div>

<div class="question-zone">
  <div class="question-inner">
    <textarea id="questionInput" class="question-input" rows="1" placeholder="Posez votre question au Gardien…"></textarea>
    <button id="consulterBtn" class="consulter-btn">Consulter</button>
  </div>
  <div class="mention">◆ &nbsp; Le Gardien éclaire. Il ne décide pas à votre place. &nbsp; ◆</div>
</div>

<script>
  const input = document.getElementById('questionInput');
  const btn = document.getElementById('consulterBtn');
  const parcheeminTexte = document.getElementById('parcheeminTexte');
  const parchemin = document.getElementById('parchemin');
  const consultationState = document.getElementById('consultationState');
  const lionSeal = document.getElementById('lionSeal');

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 110) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      consulter();
    }
  });

  btn.addEventListener('click', consulter);

  const historique = [];

  async function consulter() {
    const question = input.value.trim();
    if (!question || btn.disabled) return;

    input.disabled = true;
    btn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    parchemin.classList.remove('visible');
    consultationState.classList.add('visible');
    lionSeal.classList.add('active');
    parcheeminTexte.textContent = '';

    historique.push({ role: 'user', content: question });

    try {
      const res = await fetch('/.netlify/functions/gardien', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: historique }),
      });

      const data = await res.json();
      const reponse = data.reply ?? "Les Archives sont momentanément silencieuses. Revenez dans quelques instants.";
      historique.push({ role: 'assistant', content: reponse });

      consultationState.classList.remove('visible');
      parchemin.classList.add('visible');
      await revelerTexte(reponse);

    } catch {
      consultationState.classList.remove('visible');
      parchemin.classList.add('visible');
      await revelerTexte("Les Archives sont momentanément silencieuses. Revenez dans quelques instants.");
    }

    lionSeal.classList.remove('active');
    input.disabled = false;
    btn.disabled = false;
    input.focus();
  }

  async function revelerTexte(texte) {
    parcheeminTexte.textContent = '';
    const curseur = document.createElement('span');
    curseur.className = 'curseur';
    parcheeminTexte.appendChild(curseur);

    for (let i = 0; i < texte.length; i++) {
      const char = document.createTextNode(texte[i]);
      parcheeminTexte.insertBefore(char, curseur);
      const d = texte[i] === '.' || texte[i] === '?' || texte[i] === '!' ? 110
              : texte[i] === ',' ? 55
              : texte[i] === ' ' ? 20
              : 30;
      await sleep(d);
    }
    setTimeout(() => curseur.remove(), 2500);
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>

</body>
</html>
